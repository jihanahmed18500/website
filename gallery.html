<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Jihan Ahmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #121212; --cream: #f4f1ea; --accent: #4f46e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--cream); color: var(--dark); font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 5%; background: var(--cream); border-bottom: 1.5px solid var(--dark);
        }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; text-decoration: none; color: var(--dark); font-size: 1.5rem; }
        .back-btn { text-decoration: none; color: var(--dark); font-weight: 700; border: 1.5px solid var(--dark); padding: 10px 20px; border-radius: 12px; }

        .container { max-width: 1200px; margin: 4rem auto; padding: 0 20px; }
        h1 { font-family: 'Space Grotesk'; font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 2rem; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: #d1d1d1; /* Grey background so you know where the box is */
            border: 1.5px solid var(--dark);
            border-radius: 20px;
            overflow: hidden;
            height: 400px;
            position: relative;
            display: block;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: white;
            color: black;
            padding: 6px 12px;
            font-weight: 700;
            font-size: 0.8rem;
            border: 1.5px solid var(--dark);
            border-radius: 8px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">JIHAN AHMED</a>
        <a href="index.html" class="back-btn">← BACK HOME</a>
    </nav>

    <div class="container">
        <h1>Visual Archive</h1>
        
        <div class="gallery-grid">
            <div class="card">
                <img src="Parliment.jpeg" alt="Parliament">
                <div class="label">Parliament Summit</div>
            </div>

            <div class="card">
                <img src="MUN.jpeg" alt="Model UN">
                <div class="label">Model United Nations</div>
            </div>

            <div class="card">
                <img src="Mental-Health%20Day%201.jpeg" alt="MH Day 1">
                <div class="label">Mental Health Day I</div>
            </div>

            <div class="card">
                <img src="Mental-Health%20Day%202.jpeg" alt="MH Day 2">
                <div class="label">Mental Health Day II</div>
            </div>

            <div class="card">
                <img src="Mental-Health%20Day%203.jpeg" alt="MH Day 3">
                <div class="label">Mental Health Day III</div>
            </div>

            <div class="card">
                <img src="Equity.jpeg" alt="Equity">
                <div class="label">Equity Advocacy</div>
            </div>
        </div>
    </div>

</body>
</html>
