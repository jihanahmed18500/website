<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Archive — Jihan Ahmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #121212;
            --cream: #f4f1ea;
        }

        /* Subtle Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--cream); 
            color: var(--dark); 
            font-family: 'Inter', sans-serif;
            padding-bottom: 80px;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 5%; background: var(--cream); border-bottom: 2px solid var(--dark);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; text-decoration: none; color: var(--dark); font-size: 1.5rem; }
        .back-btn { text-decoration: none; color: var(--dark); font-weight: 700; border: 2px solid var(--dark); padding: 10px 20px; border-radius: 12px; transition: 0.3s; }
        .back-btn:hover { background: var(--dark); color: white; }

        .container { max-width: 1200px; margin: 4rem auto; padding: 0 20px; }
        h1 { font-family: 'Space Grotesk'; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: -3px; margin-bottom: 3rem; text-align: center; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: #fff;
            border: 2px solid var(--dark);
            border-radius: 24px;
            overflow: hidden;
            height: 450px;
            position: relative;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #e0e0e0;
        }

        .label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            color: var(--dark);
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 2px solid var(--dark);
            border-radius: 10px;
            box-shadow: 4px 4px 0px var(--dark);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">JIHAN AHMED</a>
        <a href="index.html" class="back-btn">← BACK HOME</a>
    </nav>

    <div class="container">
        <h1>Visual Archive</h1>
        
        <div class="gallery-grid">
            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/p1.jpeg" alt="Parliament">
                <div class="label">Parliament Summit</div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/m1.jpeg" alt="MUN">
                <div class="label">Model United Nations</div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/h1.jpeg" alt="MH1">
                <div class="label">Mental Health Day I</div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/h2.jpeg" alt="MH2">
                <div class="label">Mental Health Day II</div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/h3.jpeg" alt="MH3">
                <div class="label">Mental Health Day III</div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/jihanahmed18500/website/main/e1.jpeg" alt="Equity">
                <div class="label">Equity Advocacy</div>
            </div>
        </div>
    </div>

</body>
</html>
