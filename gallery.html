<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Archive — Jihan Ahmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #121212; --cream: #f4f1ea; --accent: #4f46e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--cream); color: var(--dark); font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; background: var(--cream); border-bottom: 2px solid var(--dark); }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; text-decoration: none; color: var(--dark); font-size: 1.5rem; }
        .back-btn { text-decoration: none; color: var(--dark); font-weight: 700; border: 2px solid var(--dark); padding: 10px 20px; border-radius: 12px; }
        .container { max-width: 1200px; margin: 4rem auto; padding: 0 20px; }
        h1 { font-family: 'Space Grotesk'; font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 3rem; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #e0e0e0; border: 2px solid var(--dark); border-radius: 24px; overflow: hidden; height: 450px; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .label { position: absolute; bottom: 20px; left: 20px; background: white; color: var(--dark); padding: 8px 16px; font-weight: 700; font-size: 0.9rem; border: 2px solid var(--dark); border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">JIHAN AHMED</a>
        <a href="index.html" class="back-btn">← BACK HOME</a>
    </nav>
    <div class="container">
        <h1>Visual Archive</h1>
        <div class="gallery-grid">
            <div class="card">
                <img src="p1.jpeg" onerror="this.src='P1.jpeg'; this.onerror=function(){this.src='p1.jpg'};" alt="Parliament">
                <div class="label">Parliament Summit</div>
            </div>
            <div class="card">
                <img src="m1.jpeg" onerror="this.src='M1.jpeg'; this.onerror=function(){this.src='m1.jpg'};" alt="MUN">
                <div class="label">Model United Nations</div>
            </div>
            <div class="card">
                <img src="h1.jpeg" onerror="this.src='H1.jpeg'; this.onerror=function(){this.src='h1.jpg'};" alt="MH1">
                <div class="label">Mental Health Day I</div>
            </div>
            <div class="card">
                <img src="h2.jpeg" onerror="this.src='H2.jpeg'; this.onerror=function(){this.src='h2.jpg'};" alt="MH2">
                <div class="label">Mental Health Day II</div>
            </div>
            <div class="card">
                <img src="h3.jpeg" onerror="this.src='H3.jpeg'; this.onerror=function(){this.src='h3.jpg'};" alt="MH3">
                <div class="label">Mental Health Day III</div>
            </div>
            <div class="card">
                <img src="e1.jpeg" onerror="this.src='E1.jpeg'; this.onerror=function(){this.src='e1.jpg'};" alt="Equity">
                <div class="label">Equity Advocacy</div>
            </div>
        </div>
    </div>
</body>
</html>
