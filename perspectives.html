<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Perspectives — Jihan Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #121212; --cream: #f4f1ea; --highlight: #ffd700; --teal: #006064; }
        body { background-color: var(--cream); color: var(--dark); font-family: 'Inter', sans-serif; padding: 2rem; }
        nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 3rem; border-bottom: 2px solid var(--dark); margin-bottom: 4rem; }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.6rem; text-decoration: none; color: var(--dark); }
        
        .bento-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        
        /* The Clickable Box Design */
        .post-box { 
            background: var(--teal); color: white; border: 2px solid var(--dark); 
            padding: 2rem; border-radius: 20px; cursor: pointer; transition: 0.3s;
            text-decoration: none; display: block;
        }
        .post-box:hover { transform: translate(-5px, -5px); box-shadow: 8px 8px 0px var(--dark); }
        .tag { background: var(--highlight); color: var(--dark); padding: 4px 10px; font-size: 0.7rem; font-weight: 900; border-radius: 5px; text-transform: uppercase; }
        h2 { font-family: 'Space Grotesk'; font-size: 1.8rem; margin: 1rem 0; }
        p { color: #e0e0e0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">JIHAN AHMED</a>
        <a href="index.html" style="text-decoration: none; font-weight: 700; color: var(--dark);">← PORTFOLIO</a>
    </nav>

    <div class="bento-grid">
        <!-- Clicking this takes you to the specific article page -->
        <a href="what-nobody-tells-you.html" class="post-box">
            <span class="tag">Reflections</span>
            <h2>What Nobody Tells You</h2>
            <p>Success, resistance, and the reality of youth leadership.</p>
            <div style="margin-top: 1.5rem; font-weight: 700; color: var(--highlight);">Read Full Entry →</div>
        </a>

        <!-- Add future boxes here -->
    </div>

</body>
</html>
